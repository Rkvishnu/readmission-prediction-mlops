apiVersion: apps/v1
kind: Deployment
metadata:
  name: readmission-api
  namespace: readmission-mlops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: readmission-api
  template:
    metadata:
      labels:
        app: readmission-api
    spec:
      containers:
        - name: api
          image: readmission-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: readmission-api-config

