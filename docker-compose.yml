services:
  api:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.api
    image: readmission-api:local
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_URI: models:/readmission-risk@production
      LOCAL_MODEL_PATH: models/readmission_model.joblib
    depends_on:
      mlflow:
        condition: service_started
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.12.0
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:////mlruns/mlflow.db --serve-artifacts --artifacts-destination /mlruns --default-artifact-root mlflow-artifacts:/ --allowed-hosts localhost,localhost:5000,127.0.0.1,127.0.0.1:5000,mlflow,mlflow:5000
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns

  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      api:
        condition: service_started

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
